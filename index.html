<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>2026 福岡放空之旅 Guide</title>
  
  <!-- 引入極致優雅的字體規範 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
  
  <!-- Phosphor Icons 核心庫 -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <style>
    :root {
      /* 優化後的福岡優雅色調：天空藍（Sora）與 index.html 的練色、消炭色、灰線完美融合 */
      --sora: #4A9CBE;
      --sora-2: #EAF4F8;
      --yamabuki: #F8B500;
      /* 山吹色 */
      --neriiro: #FCFAF2;
      /* 練色背景 */
      --kesizumi: #525750;
      /* 消炭文字色 */
      --haiku: #d6d3d1;
      /* 灰輔助線 */
      --radius-lg: 16px;
      --radius-md: 10px;
      --bottom: 78px;
    }

    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      background-color: var(--neriiro);
      color: var(--kesizumi);
      font-family: 'Zen Maru Gothic', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.7;
      -webkit-tap-highlight-color: transparent;
    }

    /* 手繪質感大氣網格背景 */
    .bg-pattern {
      background-image: radial-gradient(#d6d3d1 1px, transparent 1px);
      background-size: 32px 32px;
    }

    h1, h2, h3, h4, .serif {
      font-family: 'Noto Serif TC', serif;
    }

    a { color: inherit; text-decoration: none; }
    button, input, select, textarea { font: inherit; }

    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100dvh;
      background: var(--neriiro);
      padding-bottom: calc(var(--bottom) + env(safe-area-inset-bottom) + 32px);
      position: relative;
    }

    /* Minimal Header */
    header {
      position: sticky;
      top: 0;
      z-index: 40;
      background: rgba(253, 250, 242, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(214, 211, 209, 0.3);
      padding: 16px 20px 14px;
      text-align: center;
    }
    header .header-wrap {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      border-bottom: 2px solid var(--sora);
      padding-bottom: 8px;
    }
    header .year-tag {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--sora);
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 4px; /* 確保年份與主標題有舒適的間距 */
      line-height: 1;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin: 0;
      color: var(--kesizumi);
      letter-spacing: 0.1em;
      line-height: 1.3;
    }
    .sub {
      font-size: 11px;
      color: #8a8e87;
      margin-top: 6px;
      font-family: 'Zen Maru Gothic', sans-serif;
    }

    main { padding: 16px 16px 0; }
    .page { display: none; }
    .page.active { display: block; }

    /* Elegant Card Layout */
    .card {
      background: #FFFFFF;
      border: 1px solid rgba(214, 211, 209, 0.4);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin: 0 0 16px;
      box-shadow: 0 4px 16px rgba(82, 87, 80, 0.02);
    }
    .card.compact { padding: 14px 16px; }
    .card.focus {
      background: #FFFFFF;
      border-left: 4px solid var(--sora);
    }

    .row { display: flex; gap: 14px; align-items: flex-start; }
    .between { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .muted { color: #8a8e87; font-size: 13px; }
    
    .sectionTitle {
      font-family: 'Noto Serif TC', serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--kesizumi);
      margin: 24px 4px 12px;
      border-l-4 solid var(--sora);
      padding-left: 8px;
    }
    
    .title { font-size: 16px; margin: 0 0 8px; font-weight: 600; color: var(--kesizumi); }
    .small { font-size: 12px; }
    
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 6px;
      background: var(--sora-2);
      color: #33718c;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 500;
      margin: 4px 4px 0 0;
    }

    /* Fine Buttons */
    .btn {
      border: 0;
      border-radius: var(--radius-md);
      background: var(--kesizumi);
      color: white;
      padding: 8px 16px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .btn:active { transform: scale(0.98); }
    .btn.light { background: var(--sora-2); color: #2E7FA6; }
    .btn.ghost { background: #fff; border: 1px solid var(--haiku); color: var(--kesizumi); }
    
    .icon { color: var(--sora); font-size: 22px; flex: 0 0 auto; }
    .ph-duotone { --ph-duotone-opacity: 0.25; }

    /* Sticky Tab Bar with index.html style */
    .tabs {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      z-index: 50;
      max-width: 430px;
      width: 100%;
      background: rgba(252, 250, 242, 0.95);
      backdrop-filter: blur(10px);
      border-top: 1px solid rgba(214, 211, 209, 0.4);
      padding: 6px 8px calc(10px + env(safe-area-inset-bottom));
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      box-shadow: 0 -4px 16px rgba(0,0,0,0.02);
    }
    .tab {
      border: 0;
      background: transparent;
      color: #a1a1aa;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      font-size: 11px;
      padding: 6px 0;
      transition: colors 0.2s;
      cursor: pointer;
    }
    .tab i { font-size: 22px; }
    .tab.active { color: var(--sora); font-weight: 700; }

    /* Elegant Sub-navigation for Days (index.html style) */
    .dayNavScroll {
      overflow-x: auto;
      white-space: nowrap;
      padding: 6px 2px 12px;
      margin-bottom: 8px;
      sticky top: 73px;
      z-index: 30;
      background: var(--neriiro);
    }
    .dayNavScroll::-webkit-scrollbar { display: none; }
    .subtab-btn {
      display: inline-block;
      padding: 8px 14px;
      border-radius: var(--radius-md);
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--haiku);
      background: #FFFFFF;
      color: #78716c;
      margin-right: 6px;
      text-align: center;
      transition: all 0.2s;
    }
    .subtab-btn.active {
      background: var(--sora);
      border-color: var(--sora);
      color: #FFFFFF;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(74, 156, 190, 0.2);
    }

    /* Dashed Timeline Style */
    .timeline { position: relative; margin-left: 8px; padding-left: 24px; }
    .timeline:before {
      content: "";
      position: absolute;
      left: 0;
      top: 8px;
      bottom: 8px;
      width: 2px;
      background-image: linear-gradient(to bottom, var(--haiku) 50%, rgba(255,255,255,0) 0%);
      background-size: 2px 8px;
      background-repeat: repeat-y;
    }
    .tl { position: relative; margin: 0 0 28px; }
    .tl:before {
      content: "";
      position: absolute;
      left: -29px;
      top: 4px;
      width: 10px;
      height: 10px;
      border: 2px solid var(--sora);
      background: #FFFFFF;
      border-radius: 50%;
      z-index: 10;
    }
    .time { font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700; font-size: 12px; color: var(--sora); margin-bottom: 4px; }
    .tl h3 { font-size: 15px; margin: 0 0 4px; font-weight: 600; color: var(--kesizumi); display: flex; align-items: center; gap: 6px; }
    .tl h3 i { font-size: 18px; color: var(--kesizumi); }
    
    .actions { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
    .note { border-left: 3px solid var(--haiku); padding-left: 10px; color: #78716c; font-size: 12px; margin-top: 6px; line-height: 1.6; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    
    .infoItem { border-top: 1px solid rgba(214, 211, 209, 0.4); padding: 12px 0; }
    .infoItem:first-child { border-top: 0; padding-top: 0; }
    
    /* Shopping List & Filters */
    .shopFilters { display: flex; gap: 6px; overflow-x: auto; padding: 2px 2px 12px; margin-bottom: 4px; }
    .shopFilters::-webkit-scrollbar { display: none; }
    .filter { border: 1px solid var(--haiku); background: #fff; border-radius: var(--radius-md); padding: 6px 12px; color: #78716c; font-size: 12px; white-space: nowrap; cursor: pointer; }
    .filter.active { background: var(--kesizumi); border-color: var(--kesizumi); color: white; }
    
    .shopItem { display: grid; grid-template-columns: auto 1fr auto; gap: 14px; align-items: start; }
    .check { width: 20px; height: 20px; border: 1.5px solid var(--haiku); border-radius: 4px; background: #fff; margin-top: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--sora); }
    .shopItem.done { opacity: .45; }
    .shopItem.done .name { text-decoration: line-through; }
    .del { border: 0; background: #FCEBEA; color: #B85C4A; border-radius: var(--radius-md); width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .thumb { max-width: 100%; border-radius: var(--radius-md); margin-top: 8px; border: 1px solid var(--haiku); }
    
    /* Smooth Float Action Button */
    .fab { position: fixed; right: calc(50% - 200px); bottom: calc(var(--bottom) + 16px + env(safe-area-inset-bottom)); width: 50px; height: 50px; border-radius: 50%; border: 0; background: var(--sora); color: white; display: grid; place-items: center; font-size: 24px; z-index: 60; box-shadow: 0 4px 14px rgba(74, 156, 190, 0.4); transition: all 0.2s; cursor: pointer; }
    .fab:active { transform: scale(0.95); }
    @media(max-width:430px){ .fab { right: 16px; } }
    
    /* Form Bottom Sheets */
    .sheetBackdrop { position: fixed; inset: 0; background: rgba(82, 87, 80, 0.3); backdrop-filter: blur(4px); z-index: 70; display: none; }
    .sheet { position: fixed; left: 50%; bottom: 0; transform: translateX(-50%); max-width: 430px; width: 100%; background: var(--neriiro); border-radius: 20px 20px 0 0; border: 1px solid var(--haiku); padding: 20px calc(20px + env(safe-area-inset-bottom)); z-index: 80; display: none; box-shadow: 0 -8px 32px rgba(0,0,0,0.05); }
    .sheet.open, .sheetBackdrop.open { display: block; }
    
    .field { width: 100%; border: 1px solid var(--haiku); background: #fff; border-radius: var(--radius-md); padding: 10px 12px; margin: 6px 0 12px; color: var(--kesizumi); outline: none; }
    .field:focus { border-color: var(--sora); }
    textarea.field { min-height: 80px; resize: vertical; }
    .sheetActions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 8px; }
    
    .expenseItem { display: grid; grid-template-columns: 1fr auto auto; gap: 12px; align-items: center; border-top: 1px solid rgba(214, 211, 209, 0.4); padding: 12px 0; }
    .total { font-size: 20px; font-weight: 700; text-align: right; color: var(--sora); font-family: 'Zen Maru Gothic', sans-serif; }
    .empty { color: #a1a1aa; text-align: center; padding: 32px 0; font-size: 13px; }
    
    /* Fade animation */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.35s ease-out forwards; }
  </style>
</head>

</div>

let currentDay=0;
function i(name){return `<i class="ph-duotone ph-${name}"></i>`}
function navButton(q,label='導航'){return `<a class="btn light" target="_blank" href="${dir(q)}">${i('navigation-arrow')} ${label}</a>`}

function renderInfo(){
  document.getElementById('page-info').innerHTML=`

 <div class="card"><div class="row"><div class="icon">${i('buildings')}</div><div class="flex-1"><div class="title">Hotel</div><b>${hotel.name}</b><br><span class="muted">${hotel.jp}</span><div class="infoItem"><span class="muted">住所</span><br><span class="small">${hotel.addr}</span></div><div class="infoItem"><span class="muted">電話</span><br><a class="btn ghost small" style="padding:4px 10px; margin-top:4px;" href="tel:${hotel.phone}">${i('phone')} ${hotel.phone}</a></div><div class="infoItem"><span class="muted">Check-in / Check-out</span><br>15:00 / 11:00</div><div class="actions"><a class="btn light" href="${hotel.maps}" target="_blank">${i('map-pin')} 地圖導航</a></div></div></div></div>
 <div class="card"><div class="row"><div class="icon">${i('passport')}</div><div class="flex-1"><div class="title">Visit Japan Web</div><div class="space-y-2" style="display:flex; flex-direction:column; gap:6px;"><label><input type="checkbox" data-check="vjw1"> 入境 QR 已準備</label><label><input type="checkbox" data-check="vjw2"> 海關 QR 已準備</label><label><input type="checkbox" data-check="vjw3"> 護照與機票截圖已離線保存</label></div><div class="note">填寫飯店地址時，可直接複製上方日文地址。</div></div></div></div>
 <div class="card"><div class="row"><div class="icon">${i('ticket')}</div><div class="flex-1"><div class="title">Tickets</div><div class="infoItem"><b>湯布院</b><br><span class="muted">去程：Yufu / 高速巴士待確認。回程：由布院之森若買得到則優先。</span></div><div class="infoItem"><b>門司港</b><br><span class="muted">一般 JR 交通，依當日車次現場購買。</span></div></div></div></div>
 <div class="card"><div class="row"><div class="icon">${i('phone-call')}</div><div class="flex-1"><div class="title">Emergency</div><div class="grid2"><a class="btn ghost" href="tel:110">${i('shield')} 110 警察</a><a class="btn ghost" href="tel:119">${i('first-aid-kit')} 119 救護</a></div><div class="note">緊急時先聯絡飯店，請櫃檯協助叫車或溝通。</div></div></div></div>
 <div class="card"><div class="row"><div class="icon">${i('checks')}</div><div class="flex-1"><div class="title">出發 Checklist</div><div style="display:grid; grid-template-columns:1fr; gap:6px;">${['護照正本','機票與飯店憑證','Visit Japan Web 截圖','eSIM / 漫遊開通確認','信用卡與日幣現金','常備藥品與防曬','行動電源與充電線','Shopping List 圖片就位'].map((x,k)=>`<label><input type="checkbox" data-check="pre${k}"> ${x}</label>`).join('')}</div></div></div>`; 
  restoreChecks();
}

function restoreChecks(){document.querySelectorAll('[data-check]').forEach(el=>{el.checked=localStorage.getItem('fg_check_'+el.dataset.check)==='1';el.onchange=()=>localStorage.setItem('fg_check_'+el.dataset.check,el.checked?'1':'0')})}

function renderDaily(){
  const d=days[currentDay];
  
  // 橫向滾動日曆子分頁（複製 index.html 天數切換邏輯與質感）
  let navHtml = `<div class="dayNavScroll">`;
  days.forEach((day, idx) => {
    navHtml += `<button class="subtab-btn ${currentDay===idx?'active':''}" onclick="jumpToDay(${idx})">${day.short}</button>`;
  });
  navHtml += `</div>`;

  document.getElementById('page-daily').innerHTML= navHtml + `
 <div class="card focus"><div class="row"><div class="icon" style="color:var(--sora);">${i('cloud-sun')}</div><div><div class="title" style="font-size:15px;">${d.date} ｜ ${d.label}</div><div class="muted" style="margin-top:4px; line-height:1.6; color:var(--kesizumi);">${d.focus}</div><div style="margin-top:8px;"><span class="pill">${d.people}</span></div>${d.weather?`<div class="note" style="border-color:var(--sora); margin-top:10px;">${d.weather}</div>`:''}</div></div></div>
 <div class="card"><div class="timeline">${d.items.map(([time,title,desc,q,icon])=>`<div class="tl"><div class="time">${time}</div><h3>${i(icon)} ${title}</h3><div class="muted" style="font-size:12px; margin-top:2px;">${desc}</div><div class="actions">${navButton(q)}</div></div>`).join('')}</div></div>
 <div class="sectionTitle">備案與重點紀錄</div>
 ${d.spots.map(([name,desc,q])=>`<div class="card"><h3 style="font-size:15px; font-weight:600; margin:0 0 6px;">${name}</h3><div class="muted" style="font-size:12px; line-height:1.6;">${desc}</div><div class="actions">${navButton(q)}</div></div>`).join('')}`;
}

function jumpToDay(idx){ currentDay=idx; renderDaily(); }
function autoDay(){const today=new Date();const y=today.getFullYear(),m=String(today.getMonth()+1).padStart(2,'0'),dd=String(today.getDate()).padStart(2,'0');const key=`${y}/${m}/${dd}`;const idx=days.findIndex(d=>d.date.startsWith(key));currentDay=idx>=0?idx:0}

let shopping=JSON.parse(localStorage.getItem('fg_shop')||'null')||[
 {name:'ALLIE 防曬補貨',cat:'防曬',store:'Sun Drug / Matsukiyo',note:'清爽、不熏眼優先。',img:'',done:false},
 {name:'資生堂 / ELIXIR 想看款',cat:'保養',store:'@cosme / Sun Drug',note:'可拿圖片給店員。',img:'',done:false},
 {name:'Snow Peak 鈦杯 / 小物',cat:'Outdoor',store:'Snow Peak ONE FUKUOKA',note:'先看小物，不買大型裝備。',img:'',done:false},
 {name:'mont-bell 帽子 / 雨具',cat:'Outdoor',store:'mont-bell 福岡天神',note:'實用優先。',img:'',done:false},
 {name:'MUJI 咖哩 / 文具',cat:'雜貨',store:'MUJI',note:'輕小、限定商品優先。',img:'',done:false}
];let shopFilter='全部';

function saveShop(){localStorage.setItem('fg_shop',JSON.stringify(shopping))}

function renderShopping(){
  const cats=['全部','未買','已買',...Array.from(new Set(shopping.map(x=>x.cat).filter(Boolean)))];
  let data=shopping.filter(x=>shopFilter==='全部'||(shopFilter==='未買'&&!x.done)||(shopFilter==='已買'&&x.done)||x.cat===shopFilter);
  data=[...data.filter(x=>!x.done),...data.filter(x=>x.done)];
  document.getElementById('page-shopping').innerHTML=`<div class="card compact"><div class="title" style="margin:0;">Shopping List</div><div class="muted" style="font-size:11px; margin-top:2px;">右下角新增商品，可填寫圖片網路 URL。</div></div><div class="shopFilters">${cats.map(c=>`<button class="filter ${shopFilter===c?'active':''}" onclick="shopFilter='${c}';renderShopping()">${c}</button>`).join('')}</div>${data.length?data.map(x=>shopCard(x,shopping.indexOf(x))).join(''):'<div class="card empty">目前沒有商品</div>'}`;
}

function shopCard(x,idx){return `<div class="card compact shopItem ${x.done?'done':''}"><button class="check" onclick="shopping[${idx}].done=!shopping[${idx}].done;saveShop();renderShopping()">${x.done?i('check'):''}</button><div><div class="name"><b>${x.name}</b></div><div class="small muted" style="margin:2px 0 4px;">${x.cat||'未分類'} ｜ ${x.store||'未指定店家'}</div>${x.note?`<div class="small" style="color:#78716c;">${x.note}</div>`:''}${x.img?`<a href="${x.img}" target="_blank"><img class="thumb" src="${x.img}" onerror="this.style.display='none'"></a>`:''}</div><button class="del" onclick="shopping.splice(${idx},1);saveShop();renderShopping()">${i('trash')}</button></div>`}

function openSheet(){document.getElementById('sheetBackdrop').classList.add('open');document.getElementById('shopSheet').classList.add('open');document.getElementById('shopSheet').innerHTML=`<div class="between" style="margin-bottom:12px;"><div class="title" style="margin:0;">新增清單商品</div><button class="btn ghost" style="padding:6px; border-radius:50%;" onclick="closeSheet()">${i('x')}</button></div><input id="sn" class="field" placeholder="商品名稱"><select id="sc" class="field"><option>防曬</option><option>保養</option><option>彩妝</option><option>Outdoor</option><option>服飾</option><option>食品</option><option>雜貨</option><option>伴手禮</option></select><input id="ss" class="field" placeholder="建議店家"><input id="si" class="field" placeholder="圖片 URL（可空白）"><textarea id="st" class="field" placeholder="備註備忘"></textarea><div class="sheetActions"><button class="btn ghost" onclick="addShop(false)">繼續新增</button><button class="btn" onclick="addShop(true)">儲存確認</button></div>`;setTimeout(()=>document.getElementById('sn').focus(),50)}
function closeSheet(){document.getElementById('sheetBackdrop').classList.remove('open');document.getElementById('shopSheet').classList.remove('open')}
function addShop(close){const n=document.getElementById('sn').value.trim();if(!n)return;shopping.push({name:n,cat:document.getElementById('sc').value,store:document.getElementById('ss').value.trim(),img:document.getElementById('si').value.trim(),note:document.getElementById('st').value.trim(),done:false});saveShop();renderShopping(); if(close) closeSheet(); else ['sn','ss','si','st'].forEach(id=>document.getElementById(id).value='')}

let expenses=JSON.parse(localStorage.getItem('fg_exp')||'[]');function saveExp(){localStorage.setItem('fg_exp',JSON.stringify(expenses))}

function renderExpense(){
  let total=expenses.reduce((s,x)=>s+Number(x.amount||0),0);
  document.getElementById('page-expense').innerHTML=`<div class="card"><div class="title">旅途記帳</div><div class="row" style="flex-direction:column; gap:2px;"><input id="edate" class="field" value="${days[currentDay].date.slice(0,10)}"><input id="ename" class="field" placeholder="消費項目（例：一蘭拉麵）"><input id="eamt" class="field" type="number" placeholder="日幣金額 (JPY)"><button class="btn" style="width:100%; justify-content:center; margin-top:4px;" onclick="addExpense()">${i('plus')} 新增紀錄</button></div></div><div class="card compact"><div class="between"><span>累積花費總計</span><span class="total">¥${total.toLocaleString()}</span></div></div>${expenses.map((x,idx)=>`<div class="card compact expenseItem"><div><b>${x.name}</b><br><span class="small muted">${x.date}</span></div><div class="total" style="font-size:15px; margin-right:8px;">¥${Number(x.amount).toLocaleString()}</div><button class="del" onclick="expenses.splice(${idx},1);saveExp();renderExpense()">${i('trash')}</button></div>`).join('')||'<div class="card empty">目前尚無本地記帳紀錄</div>'}`;
}

function addExpense(){const name=document.getElementById('ename').value.trim(),amount=document.getElementById('eamt').value;if(!name||!amount)return;expenses.push({date:document.getElementById('edate').value,name,amount:Number(amount)});saveExp();renderExpense()}

function switchPage(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.page===p));
  document.getElementById('shopFab').style.display=p==='shopping'?'grid':'none'; 
  if(p==='daily')renderDaily(); 
  if(p==='shopping')renderShopping(); 
  if(p==='expense')renderExpense();
}

document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>switchPage(b.dataset.page));
document.getElementById('shopFab').onclick=openSheet;
document.getElementById('sheetBackdrop').onclick=closeSheet;
autoDay();
renderInfo();
renderDaily();
renderShopping();
renderExpense();
</script>
