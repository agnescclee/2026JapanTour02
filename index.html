  <title>2026 福岡放空之旅 Guide</title>

  <!-- Phosphor Icons 核心庫 -->

  <style>
    :root {
      /* 福岡藍調美學核心 */
      --sora: #58B2DC;       /* 空色 - 主色調（Icon、亮點） */
      --sora-2: #EAF4F8;     /* 空色淡 - 標籤與輕背景 */
      --sora-deep: #2E7FA6;  /* 深空藍（碧瑠璃） - 專門用於關鍵標題跳色 */
      --yamabuki: #F8B500;   /* 山吹色 - 警告與重要提醒 */
      --neriiro: #FCFAF2;    /* 練色 - 全域背景 */
      
      /* 文字色彩階梯 */
      --text-main: #3A4C56;  /* 藍鼠調和 - 主文字色 */
      --text-muted: #6E8896; /* 千草微調 - 輔助與次要說明文字色 */
      --line: rgba(90, 126, 144, 0.15); /* 微藍細輔助線 */
      
      --radius-lg: 16px;
      --radius-md: 10px;
      --bottom: 78px;
    }

    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      background-color: var(--neriiro);
      color: var(--text-main);
      font-family: 'Zen Maru Gothic', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.7;
      -webkit-tap-highlight-color: transparent;
    }

    /* 手繪質感大氣網格背景 */
    .bg-pattern {
      background-image: radial-gradient(rgba(110, 136, 150, 0.18) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    h1, h2, h3, h4, .serif {
      font-family: 'Noto Serif TC', serif;
      color: var(--text-main);
    }

    a { color: inherit; text-decoration: none; }
    button, input, select, textarea { font: inherit; }

    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100dvh;
      background: var(--neriiro);
      padding-bottom: calc(var(--bottom) + env(safe-area-inset-bottom) + 32px);
      position: relative;
    }

    /* Minimal Header */
    header {
      position: sticky;
      top: 0;
      z-index: 40;
      background: rgba(253, 250, 242, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(214, 211, 209, 0.3);
      padding: 16px 20px 14px;
      text-align: center;
    }
    header .header-wrap {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      border-bottom: 2px solid var(--sora);
      padding-bottom: 8px;
    }
    header .year-tag {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--sora);
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 4px;
      line-height: 1;
    }
    header h1 {
      font-size: 22px;
      font-weight: 700;
      margin: 0;
      color: var(--sora-deep);
      letter-spacing: 0.1em;
      line-height: 1.3;
    }

    main { padding: 16px 16px 0; }
    .page { display: none; }
    .page.active { display: block; }

    /* Elegant Card Layout */
    .card {
      background: #FFFFFF;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin: 0 0 16px;
      box-shadow: 0 4px 16px rgba(58, 76, 86, 0.01);
    }
    .card.compact { padding: 14px 16px; }
    .card.focus {
      background: #FFFFFF;
      border-left: 4px solid var(--sora);
    }
    .card.focus .title {
      color: var(--sora-deep) !important;
    }

    .row { display: flex; gap: 14px; align-items: flex-start; }
    .between { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .muted { color: var(--text-muted); font-size: 13px; }
    
    .sectionTitle {
      font-family: 'Noto Serif TC', serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--text-main);
      margin: 24px 4px 12px;
      border-left: 4px solid var(--sora);
      padding-left: 8px;
    }
    
    .title { font-size: 16px; margin: 0 0 8px; font-weight: 600; color: var(--text-main); }
    .small { font-size: 12px; }
    
    .day-weekday-tag {
      display: inline-flex;
      align-items: center;
      border-radius: 6px;
      background: #F0F2F4;
      color: var(--text-muted);
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 500;
      flex-shrink: 0;
      font-family: 'Zen Maru Gothic', sans-serif;
    }

    /* Fine Buttons */
    .btn {
      border: 0;
      border-radius: var(--radius-md);
      background: var(--sora-deep);
      color: white;
      padding: 8px 16px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .btn:active { transform: scale(0.98); }
    .btn.light { background: var(--sora-2); color: var(--sora-deep); }
    .btn.ghost { background: #fff; border: 1px solid var(--text-muted); color: var(--text-main); }
    
    .icon { color: var(--sora); font-size: 22px; flex: 0 0 auto; }
    .ph-duotone { --ph-duotone-opacity: 0.25; }

    /* Sticky Tab Bar */
    .tabs {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      z-index: 50;
      max-width: 430px;
      width: 100%;
      background: rgba(252, 250, 242, 0.95);
      backdrop-filter: blur(10px);
      border-top: 1px solid rgba(214, 211, 209, 0.4);
      padding: 6px 8px calc(10px + env(safe-area-inset-bottom));
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      box-shadow: 0 -4px 16px rgba(0,0,0,0.02);
    }
    .tab {
      border: 0;
      background: transparent;
      color: #a1a1aa;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      font-size: 11px;
      padding: 6px 0;
      transition: colors 0.2s;
      cursor: pointer;
    }
    .tab i { font-size: 22px; color: inherit; }
    .tab span { color: inherit; }
    .tab.active,
    .tab.active i,
    .tab.active span { color: var(--sora); }
    .tab.active span { font-weight: 700; }

    /* 日期導覽列 */
    .dayNavContainer {
      padding: 12px 4px 16px;
      text-align: center;
      position: sticky;
      top: 73px;
      z-index: 30;
      background: var(--neriiro);
    }
    .month-header {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      margin-bottom: 8px;
      font-weight: 700;
    }
    .dayNavScroll {
      display: flex;
      justify-content: space-between;
      gap: 4px;
    }
    .subtab-btn {
      flex: 1;
      min-width: 34px;
      padding: 6px 0;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--line);
      background: #FFFFFF;
      color: var(--text-muted);
      text-align: center;
      transition: all 0.2s;
      cursor: pointer;
    }
    .subtab-btn.active {
      background: var(--sora);
      border-color: var(--sora);
      color: #FFFFFF;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(74, 156, 190, 0.2);
    }
    .flex-1 { flex: 1; min-width: 0; }

    /* Dashed Timeline Style */
    .timeline { position: relative; margin-left: 8px; padding-left: 24px; }
    .timeline:before {
      content: "";
      position: absolute;
      left: 0;
      top: 8px;
      bottom: 8px;
      width: 2px;
      background-image: linear-gradient(to bottom, var(--text-muted) 40%, rgba(255,255,255,0) 0%);
      background-size: 2px 8px;
      background-repeat: repeat-y;
      opacity: 0.3;
    }
    .tl { position: relative; margin: 0 0 28px; }
    .tl:before {
      content: "";
      position: absolute;
      left: -29px;
      top: 4px;
      width: 10px;
      height: 10px;
      border: 2px solid var(--sora);
      background: #FFFFFF;
      border-radius: 50%;
      z-index: 10;
    }
    
    .time { font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700; font-size: 12px; color: var(--sora-deep); margin-bottom: 4px; }
    .tl h3 { font-size: 15px; margin: 0 0 4px; font-weight: 600; color: var(--sora-deep); display: flex; align-items: center; gap: 6px; }
    .tl h3 i { font-size: 18px; color: var(--sora-deep); }
    .tl-title { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; }
    .map-pin-link {
      color: #d6d3d1;
      font-size: 20px;
      flex-shrink: 0;
      transition: color 0.2s;
      line-height: 1;
      display: inline-flex;
      align-items: center;
    }
    .map-pin-link:hover { color: var(--sora); }
    .hotel-map-link {
      color: #a8a29e;
      font-size: 18px;
      margin-left: 8px;
      transition: color 0.2s;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
    }
    .hotel-map-link:hover { color: var(--sora); }
    .spot-head { margin: 0 0 6px; }
    
    .actions { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
    .note { border-left: 3px solid var(--text-muted); padding-left: 10px; color: var(--text-muted); font-size: 12px; margin-top: 6px; line-height: 1.6; opacity: 0.85; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    
    .infoItem { border-top: 1px solid var(--line); padding-top: 12px; margin-top: 12px; }
    .infoItem:first-child { border-top: 0; padding-top: 0; margin-top: 0; }
    
    /* Shopping List & Filters */
    .shopFilters { display: flex; gap: 6px; overflow-x: auto; padding: 2px 2px 12px; margin-bottom: 4px; }
    .shopFilters::-webkit-scrollbar { display: none; }
    .filter { border: 1px solid var(--line); background: #fff; border-radius: var(--radius-md); padding: 6px 12px; color: var(--text-muted); font-size: 12px; white-space: nowrap; cursor: pointer; }
    .filter.active { background: var(--text-main); border-color: var(--text-main); color: white; }
    
    .shopItem { display: grid; grid-template-columns: auto 1fr auto; gap: 12px; align-items: start; }
    .shopItem.has-thumb { grid-template-columns: auto 56px 1fr auto; }
    .check { width: 20px; height: 20px; border: 1.5px solid var(--line); border-radius: 4px; background: #fff; margin-top: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--sora); }
    .shopItem.done { opacity: .45; }
    .shopItem.done .name { text-decoration: line-through; }
    .shopThumb { display: block; width: 56px; height: 56px; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--line); flex-shrink: 0; }
    .shopItem .thumb { width: 100%; height: 100%; max-width: none; margin: 0; object-fit: cover; display: block; border: 0; border-radius: 0; }
    .del { border: 0; background: #FCEBEA; color: #B85C4A; border-radius: var(--radius-md); width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .edit { border: 0; background: var(--sora-2); color: var(--sora-deep); border-radius: var(--radius-md); width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .shopActions { display: flex; gap: 6px; flex-shrink: 0; }
    
    /* FAB Button */
    .fab { position: fixed; right: calc(50% - 200px); bottom: calc(var(--bottom) + 16px + env(safe-area-inset-bottom)); width: 50px; height: 50px; border-radius: 50%; border: 0; background: var(--sora); color: white; display: none; place-items: center; font-size: 24px; z-index: 60; box-shadow: 0 4px 14px rgba(74, 156, 190, 0.4); transition: all 0.2s; cursor: pointer; }
    .fab.show { display: grid; }
    .fab:active { transform: scale(0.95); }
    @media(max-width:430px){ .fab { right: 16px; } }
    
    /* Form Bottom Sheets */
    .sheetBackdrop { position: fixed; inset: 0; background: rgba(58, 76, 86, 0.25); backdrop-filter: blur(4px); z-index: 70; display: none; }
    .sheet { position: fixed; left: 50%; bottom: 0; transform: translateX(-50%); max-width: 430px; width: 100%; background: var(--neriiro); border-radius: 20px 20px 0 0; border: 1px solid var(--line); padding: 20px calc(20px + env(safe-area-inset-bottom)); z-index: 80; display: none; box-shadow: 0 -8px 32px rgba(0,0,0,0.05); }
    .sheet.open, .sheetBackdrop.open { display: block; }
    
    .field { width: 100%; border: 1px solid var(--line); background: #fff; border-radius: var(--radius-md); padding: 10px 12px; margin: 6px 0 12px; color: var(--text-main); outline: none; }
    .field:focus { border-color: var(--sora); }
    textarea.field { min-height: 80px; resize: vertical; }
    .sheetActions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 8px; }
    
    .expItem { display: grid; grid-template-columns: 1fr auto auto; gap: 12px; align-items: start; }
    .fieldRow { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .total { font-size: 20px; font-weight: 700; text-align: right; color: var(--sora); font-family: 'Zen Maru Gothic', sans-serif; }
    .empty { color: var(--text-muted); text-align: center; padding: 32px 0; font-size: 13px; }
  </style>
</head>

<div class="app">
<header>

let currentDay=0;
function i(name){return `<i class="ph-duotone ph-${name}"></i>`}
function peopleIcon(type){
  if(type==='couple'||type==='users') return i('users');
  if(type==='family'||type==='users-three') return i('users-three');
  return i('users-three');
}
function navButton(destination,origin,label='導航',icon){return `<a class="btn light" target="_blank" href="${navUrl(destination,origin,icon)}">${i('navigation-arrow')} ${label}</a>`}
const transitIcons=new Set(['car','airplane-tilt','train','bus','boat','footprints']);
function isTransit(icon){return transitIcons.has(icon);}
function mapPinLink(q){return `<a href="${mapSearch(q)}" target="_blank" class="map-pin-link">${i('map-pin')}</a>`}
function renderTimelineItems(items){
  return items.map(([time,title,desc,q,icon],idx)=>{
    const origin=idx>0?items[idx-1][3]:null;
    const transit=isTransit(icon);
    const head=transit
      ? `<h3 style="color:var(--sora-deep);">${i(icon)} ${title}</h3>`
      : `<h3 class="between" style="color:var(--sora-deep);"><span class="tl-title">${i(icon)} ${title}</span>${mapPinLink(q)}</h3>`;
    const action=transit?`<div class="actions">${navButton(q,origin,'導航',icon)}</div>`:'';
    return `<div class="tl"><div class="time">${time}</div>${head}<div class="muted" style="font-size:12px; margin-top:2px;">${desc}</div>${action}</div>`;
  }).join('');
}
function renderSpotCard(name,desc,q){
  return `<div class="card"><h3 class="between spot-head" style="font-size:15px; font-weight:600; color:var(--sora-deep);"><span>${name}</span>${mapPinLink(q)}</h3><div class="muted" style="font-size:12px; line-height:1.6;">${desc}</div></div>`;
}

const JMA_REGIONS={
  fukuoka:{jmaCode:'400000',tempArea:'福岡',wniUrl:'https://weathernews.jp/onebox/tenki/fukuoka/40130/week.html?tab=4'},
  oita:{jmaCode:'440000',tempArea:'大分',wniUrl:'https://weathernews.jp/onebox/tenki/oita/44213/week.html?tab=4'}
};
function getJmaRegionForDay(d){return d.label==='湯布院'?JMA_REGIONS.oita:JMA_REGIONS.fukuoka}
function dayDateKey(d){return d.date.slice(0,10).replace(/\//g,'-')}
function jmaWeatherLabel(code){
  const c=Number(code);
  if(c>=100&&c<200){if(c===100||c===110)return'晴';if(c===101||c===111)return'晴時多雲';return'晴時多雲'}
  if(c>=200&&c<300){if(c===200)return'多雲';if(c===201)return'多雲時晴';if(c===202||c===203||c===211||c===214)return'多雲時雨';if(c===313)return'短暫陣雨';return'多雲'}
  if(c>=300&&c<400)return'雨';
  return'多雲';
}
function parseJmaDay(data,dateKey,region){
  const weekly=data[data.length-1];
  if(!weekly||!weekly.timeSeries)return null;
  const wxSeries=weekly.timeSeries.find(s=>s.areas?.some(a=>a.weatherCodes));
  const tempSeries=weekly.timeSeries.find(s=>s.areas?.some(a=>a.tempsMin));
  if(!wxSeries)return null;
  const wxArea=wxSeries.areas.find(a=>String(a.area.code)===region.jmaCode)||wxSeries.areas[0];
  const idx=wxSeries.timeDefines.findIndex(t=>t.startsWith(dateKey));
  if(idx<0)return null;
  const pop=Math.max(0,...wxArea.pops.slice(idx,idx+1).map(p=>Number(p)).filter(n=>!isNaN(n)));
  let min,max;
  if(tempSeries){
    const tArea=tempSeries.areas.find(a=>a.area.name===region.tempArea)||tempSeries.areas[0];
    min=tArea.tempsMin[idx];
    max=tArea.tempsMax[idx];
  }
  if(!min||!max)return null;
  return{label:jmaWeatherLabel(wxArea.weatherCodes[idx]),pop,min,max};
}
const jmaCache={};
let jmaFetchToken=0;
function weatherFallbackText(d){return `${d.weatherTxt} ｜ ${d.tempRange}`}
async function fetchJMAWeather(d){
  const el=document.getElementById('jma-weather-text');
  if(!el)return;
  const token=++jmaFetchToken;
  const region=getJmaRegionForDay(d);
  const dateKey=dayDateKey(d);
  const applyFallback=()=>{if(token!==jmaFetchToken)return;el.textContent=weatherFallbackText(d)}
  try{
    if(!jmaCache[region.jmaCode]){
      const res=await fetch(`https://www.jma.go.jp/bosai/forecast/data/forecast/${region.jmaCode}.json`);
      if(!res.ok)throw new Error('JMA fetch failed');
      jmaCache[region.jmaCode]=await res.json();
    }
    if(token!==jmaFetchToken)return;
    const parsed=parseJmaDay(jmaCache[region.jmaCode],dateKey,region);
    if(!parsed){applyFallback();return}
    el.innerHTML=`${parsed.label} (降水 ${parsed.pop}%) ｜ <span style="color:var(--text-muted);">${parsed.min}–${parsed.max}°C</span>`;
  }catch(_){applyFallback()}
}

const EXP_CATS=['食','宿','交通','購物','娛樂','門票'];
const EXP_CURRENCIES=['JPY','TWD','USD'];
function expCatOptions(sel=''){
  const opts=EXP_CATS.map(c=>`<option${c===sel?' selected':''}>${c}</option>`).join('');
  return sel&&!EXP_CATS.includes(sel)?opts+`<option selected>${escAttr(sel)}</option>`:opts;
}
function expCurrencyOptions(sel='JPY'){return EXP_CURRENCIES.map(c=>`<option${c===sel?' selected':''}>${c}</option>`).join('')}
function moneyFmt(cur,amt){const sym={JPY:'¥',TWD:'NT$',USD:'$'};return (sym[cur]||cur+' ')+Number(amt).toLocaleString()}
function expTotalsHtml(){
  const map={};
  expenses.forEach(x=>{const c=x.currency||'JPY';map[c]=(map[c]||0)+Number(x.amount||0)});
  const parts=Object.entries(map).map(([c,a])=>moneyFmt(c,a));
  return parts.length?parts.join(' ｜ '):'¥0';
}
function renderExpense(){
  const extra=Array.from(new Set(expenses.map(x=>x.cat).filter(c=>c&&!EXP_CATS.includes(c))));
